version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ssssy-backend-dev
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ssssy_website
      SPRING_DATASOURCE_USERNAME: ssssy
      SPRING_DATASOURCE_PASSWORD: ssssy_dev_password
      APP_STORAGE_TYPE: minio
      APP_STORAGE_MINIO_ENDPOINT: http://minio:9000
      APP_STORAGE_MINIO_ACCESS_KEY: ssssy_admin
      APP_STORAGE_MINIO_SECRET_KEY: minio_dev_password
      APP_STORAGE_MINIO_BUCKET: ssssy-media
      SPRING_MAIL_HOST: mailhog
      SPRING_MAIL_PORT: "1025"
      APP_BASE_URL: http://localhost:3000
    depends_on:
      postgres:
        condition: service_started
      minio:
        condition: service_started
      redis:
        condition: service_started
    volumes:
      - backend_uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ssssy-frontend-dev
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080/api
    depends_on:
      - backend

  mailhog:
    image: mailhog/mailhog:latest
    container_name: ssssy-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  backend_uploads:
