server:
  port: 8080

spring:
  application:
    name: ssssy-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ssssy_website}
    username: ${SPRING_DATASOURCE_USERNAME:ssssy}
    password: ${SPRING_DATASOURCE_PASSWORD:ssssy_dev_password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: false
    out-of-order: true
    placeholder-replacement: false

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

  mail:
    host: ${SPRING_MAIL_HOST:localhost}
    port: ${SPRING_MAIL_PORT:1025}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SPRING_MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${SPRING_MAIL_SMTP_STARTTLS:false}

app:
  base-url: ${APP_BASE_URL:https://ssssy.org.sy}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}
  jwt:
    secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
    expiration-ms: 900000
    refresh-expiration-ms: 604800000

  upload:
    max-file-size: 50MB
    allowed-types: image/jpeg,image/png,image/webp,image/gif,application/pdf,application/zip

  storage:
    type: ${APP_STORAGE_TYPE:local}
    local:
      path: ${APP_STORAGE_LOCAL_PATH:uploads}
    minio:
      endpoint: ${APP_STORAGE_MINIO_ENDPOINT:http://localhost:9000}
      access-key: ${APP_STORAGE_MINIO_ACCESS_KEY:minioadmin}
      secret-key: ${APP_STORAGE_MINIO_SECRET_KEY:minioadmin}
      bucket: ${APP_STORAGE_MINIO_BUCKET:ssssy-media}

  email:
    domain: ${SSSSY_EMAIL_DOMAIN:ssssy.org.sy}
    default-quota: ${SSSSY_EMAIL_DEFAULT_QUOTA:1073741824}
    imap:
      host: ${SSSSY_EMAIL_IMAP_HOST:localhost}
      port: ${SSSSY_EMAIL_IMAP_PORT:143}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

migration:
  legacy-sections:
    enabled: false

logging:
  file:
    path: ${LOG_DIR:logs}
  level:
    org.ssssy: DEBUG
    org.springframework.security: INFO
