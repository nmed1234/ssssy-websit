version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: ssssy-postgres
    environment:
      POSTGRES_DB: ssssy_website
      POSTGRES_USER: ssssy
      POSTGRES_PASSWORD: ssssy_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: ssssy-minio
    environment:
      MINIO_ROOT_USER: ssssy_admin
      MINIO_ROOT_PASSWORD: minio_dev_password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  redis:
    image: redis:7-alpine
    container_name: ssssy-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  minio_data:
  redis_data:
