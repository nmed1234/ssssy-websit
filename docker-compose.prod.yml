version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ssssy-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ssssy_website
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-ssssy}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      APP_STORAGE_TYPE: ${STORAGE_TYPE:-minio}
      APP_STORAGE_MINIO_ENDPOINT: http://minio:9000
      APP_STORAGE_MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      APP_STORAGE_MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      APP_STORAGE_MINIO_BUCKET: ${MINIO_BUCKET:-ssssy-media}
      APP_JWT_SECRET: ${JWT_SECRET}
      APP_BASE_URL: ${APP_BASE_URL:-https://ssssy.org.sy}
      SPRING_MAIL_HOST: ${SMTP_HOST}
      SPRING_MAIL_PORT: ${SMTP_PORT:-587}
      SPRING_MAIL_USERNAME: ${SMTP_USERNAME}
      SPRING_MAIL_PASSWORD: ${SMTP_PASSWORD}
      SPRING_MAIL_SMTP_AUTH: "true"
      SPRING_MAIL_SMTP_STARTTLS: "true"
      SSSSY_EMAIL_IMAP_HOST: ${IMAP_HOST}
      SSSSY_EMAIL_IMAP_PORT: ${IMAP_PORT:-143}
      LOGGING_LEVEL_ORG_SSSSY: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      redis:
        condition: service_started
    volumes:
      - backend_uploads:/app/uploads
      - backend_logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ssssy-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${API_URL:-https://ssssy.org.sy/api}
    depends_on:
      - backend

  postgres:
    image: postgres:16-alpine
    container_name: ssssy-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ssssy_website
      POSTGRES_USER: ${DB_USER:-ssssy}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ssssy} -d ssssy_website"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: ssssy-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: ssssy-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  minio_data:
  redis_data:
  backend_uploads:
  backend_logs:

networks:
  default:
    name: ssssy-network
